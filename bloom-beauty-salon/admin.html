<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Адмін — ДІМ КЕРАТИНУ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A96E; --gold-dark: #b8955a; --gold-light: #F5EFE6;
      --green: #2D5A3D; --cream: #F8F6F2; --dark: #1A1A1A;
      --muted: #7a6f65; --white: #fff; --red: #c0392b; --red-bg: #fdf0f0;
    }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .login-box {
      background: var(--white); border-radius: 24px; padding: 3rem 2.5rem;
      width: 100%; max-width: 400px; box-shadow: 0 16px 48px rgba(26,26,26,0.1);
      text-align: center;
    }
    .login-logo { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 0.4rem; }
    .login-logo span { color: var(--gold); }
    .login-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .login-box input {
      width: 100%; padding: 0.9rem 1.1rem; border: 1.5px solid rgba(201,169,110,0.3);
      border-radius: 12px; font-family: 'Inter',sans-serif; font-size: 1rem;
      outline: none; margin-bottom: 1rem; transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; padding: 0.95rem; background: var(--gold); color: var(--white);
      border: none; border-radius: 50px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .login-btn:hover { background: var(--gold-dark); }
    .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.8rem; display: none; }

    /* ── ADMIN PANEL ── */
    #admin-panel { display: none; }
    .admin-header {
      background: var(--dark); color: var(--white); padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .admin-header-left { display: flex; align-items: center; gap: 1rem; }
    .admin-title { font-size: 1rem; font-weight: 600; }
    .admin-title span { color: var(--gold); }
    .header-btn {
      padding: 0.5rem 1.2rem; border-radius: 50px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; border: none; transition: 0.2s;
    }
    .btn-save { background: var(--gold); color: var(--white); }
    .btn-save:hover { background: var(--gold-dark); }
    .btn-site { background: rgba(255,255,255,0.1); color: var(--white); text-decoration: none; display: inline-flex; align-items: center; }
    .btn-site:hover { background: rgba(255,255,255,0.2); }
    .btn-logout { background: transparent; color: rgba(255,255,255,0.5); font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); }
    .btn-logout:hover { color: var(--white); }

    .admin-body { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .admin-section-title {
      font-size: 1.1rem; font-weight: 700; margin-bottom: 1.2rem;
      padding-bottom: 0.6rem; border-bottom: 2px solid var(--gold-light);
      display: flex; align-items: center; justify-content: space-between;
    }
    .btn-add {
      padding: 0.45rem 1.1rem; background: var(--green); color: var(--white);
      border: none; border-radius: 50px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ── SERVICE CARD (admin) ── */
    .service-editor {
      background: var(--white); border-radius: 16px; padding: 1.5rem;
      margin-bottom: 1rem; border: 1px solid rgba(201,169,110,0.15);
      transition: box-shadow 0.2s;
    }
    .service-editor:hover { box-shadow: 0 4px 16px rgba(26,26,26,0.08); }
    .service-editor-header {
      display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem;
    }
    .icon-input {
      width: 52px; text-align: center; font-size: 1.5rem;
      border: 1.5px solid rgba(201,169,110,0.3); border-radius: 10px;
      padding: 0.35rem; outline: none; flex-shrink: 0;
    }
    .name-input {
      flex: 1; font-size: 1rem; font-weight: 600;
      border: 1.5px solid rgba(201,169,110,0.3); border-radius: 10px;
      padding: 0.5rem 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .name-input:focus { border-color: var(--gold); }
    .toggle-active {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.82rem; color: var(--muted); flex-shrink: 0; cursor: pointer;
    }
    .toggle-active input { accent-color: var(--green); width: 16px; height: 16px; cursor: pointer; }
    .btn-delete-service {
      background: var(--red-bg); color: var(--red); border: none;
      border-radius: 8px; padding: 0.4rem 0.7rem; font-size: 0.82rem;
      cursor: pointer; flex-shrink: 0; transition: background 0.2s;
    }
    .btn-delete-service:hover { background: #f8d7d7; }

    .desc-input {
      width: 100%; font-family: 'Inter',sans-serif; font-size: 0.9rem;
      border: 1.5px solid rgba(201,169,110,0.3); border-radius: 10px;
      padding: 0.6rem 0.9rem; outline: none; resize: vertical; min-height: 60px;
      margin-bottom: 1rem; transition: border-color 0.2s;
    }
    .desc-input:focus { border-color: var(--gold); }

    .prices-label {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .btn-add-price {
      background: var(--gold-light); color: var(--gold-dark); border: none;
      border-radius: 6px; padding: 0.25rem 0.7rem; font-size: 0.78rem;
      font-weight: 600; cursor: pointer;
    }
    .price-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    .price-label-input, .price-value-input {
      flex: 1; padding: 0.5rem 0.8rem; border: 1.5px solid rgba(201,169,110,0.25);
      border-radius: 8px; font-family: 'Inter',sans-serif; font-size: 0.88rem; outline: none;
      transition: border-color 0.2s;
    }
    .price-label-input:focus, .price-value-input:focus { border-color: var(--gold); }
    .price-label-input { color: var(--muted); }
    .price-value-input { color: var(--gold-dark); font-weight: 600; }
    .btn-delete-price {
      background: none; border: none; color: #ccc; font-size: 1.1rem;
      cursor: pointer; padding: 0 0.3rem; transition: color 0.2s; flex-shrink: 0;
    }
    .btn-delete-price:hover { color: var(--red); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--green); color: var(--white); padding: 0.8rem 2rem;
      border-radius: 50px; font-weight: 600; font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── INACTIVE STATE ── */
    .service-editor.inactive { opacity: 0.5; }

    @media (max-width: 600px) {
      .admin-body { padding: 1rem; }
      .service-editor-header { flex-wrap: wrap; }
      .price-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">ДІМ <span>КЕРАТИНУ</span></div>
    <div class="login-sub">Адмін-панель</div>
    <input type="password" id="pwd-input" placeholder="Введіть пароль" />
    <button class="login-btn" onclick="doLogin()">Увійти</button>
    <div class="login-error" id="login-error">Невірний пароль</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <header class="admin-header">
    <div class="admin-header-left">
      <div class="admin-title">ДІМ <span>КЕРАТИНУ</span> — Адмін</div>
    </div>
    <div style="display:flex;gap:0.6rem;align-items:center;">
      <button class="header-btn btn-save" onclick="saveAll()">💾 Зберегти зміни</button>
      <a href="index.html" target="_blank" class="header-btn btn-site">🌐 Переглянути сайт</a>
      <button class="header-btn btn-logout" onclick="doLogout()">Вийти</button>
    </div>
  </header>

  <div class="admin-body">
    <div class="admin-section-title">
      <span>Послуги та ціни</span>
      <button class="btn-add" onclick="addService()">+ Додати послугу</button>
    </div>
    <div id="services-list"></div>
  </div>
</div>

<div id="toast">✓ Збережено!</div>

<script src="js/config.js"></script>
<script>
// ── AUTH ──────────────────────────────────────────────────────
function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadServices();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

// Автологін якщо вже авторизований у цій сесії
if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
}

// ── LOAD SERVICES ─────────────────────────────────────────────
let currentServices = [];

function loadServices() {
  const saved = localStorage.getItem('dim_keratin_services');
  currentServices = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(SERVICES));
  renderAdminServices();
}

// ── RENDER ────────────────────────────────────────────────────
function renderAdminServices() {
  const list = document.getElementById('services-list');
  list.innerHTML = '';
  currentServices.forEach((s, i) => {
    list.appendChild(buildServiceEditor(s, i));
  });
}

function buildServiceEditor(s, idx) {
  const card = document.createElement('div');
  card.className = 'service-editor' + (s.active ? '' : ' inactive');
  card.dataset.idx = idx;

  // Prices HTML
  const pricesHtml = s.prices.map((p, pi) => buildPriceRow(idx, pi, p)).join('');

  card.innerHTML = `
    <div class="service-editor-header">
      <input class="icon-input" type="text" value="${s.icon}" maxlength="4"
        oninput="updateField(${idx},'icon',this.value)" title="Іконка (емодзі)" />
      <input class="name-input" type="text" value="${escHtml(s.name)}"
        oninput="updateField(${idx},'name',this.value)" placeholder="Назва послуги" />
      <label class="toggle-active">
        <input type="checkbox" ${s.active ? 'checked' : ''}
          onchange="toggleActive(${idx},this.checked)" />
        Показувати
      </label>
      <button class="btn-delete-service" onclick="deleteService(${idx})">🗑 Видалити</button>
    </div>
    <textarea class="desc-input" oninput="updateField(${idx},'desc',this.value)"
      placeholder="Короткий опис послуги...">${escHtml(s.desc)}</textarea>
    <div class="prices-label">
      Ціни
      <button class="btn-add-price" onclick="addPrice(${idx})">+ Додати рядок</button>
    </div>
    <div class="prices-container" id="prices-${idx}">${pricesHtml}</div>
  `;
  return card;
}

function buildPriceRow(idx, pi, p) {
  return `
    <div class="price-row" id="price-row-${idx}-${pi}">
      <input class="price-label-input" type="text" value="${escHtml(p.label)}"
        placeholder="Назва (напр. Коротке волосся)"
        oninput="updatePrice(${idx},${pi},'label',this.value)" />
      <input class="price-value-input" type="text" value="${escHtml(p.value)}"
        placeholder="Ціна (напр. 2 000 грн)"
        oninput="updatePrice(${idx},${pi},'value',this.value)" />
      <button class="btn-delete-price" onclick="deletePrice(${idx},${pi})" title="Видалити рядок">✕</button>
    </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────
function updateField(idx, field, val) {
  currentServices[idx][field] = val;
}

function toggleActive(idx, checked) {
  currentServices[idx].active = checked;
  const card = document.querySelector(`.service-editor[data-idx="${idx}"]`);
  if (card) card.classList.toggle('inactive', !checked);
}

function deleteService(idx) {
  if (!confirm(`Видалити послугу "${currentServices[idx].name}"?`)) return;
  currentServices.splice(idx, 1);
  renderAdminServices();
}

function addService() {
  currentServices.push({
    icon: '✨', name: 'Нова послуга', desc: 'Опис послуги...',
    prices: [{ label: 'Ціна', value: 'уточнюється' }], active: true
  });
  renderAdminServices();
  // Прокрутити до нової картки
  setTimeout(() => {
    document.getElementById('services-list').lastElementChild.scrollIntoView({ behavior: 'smooth' });
  }, 50);
}

function addPrice(idx) {
  currentServices[idx].prices.push({ label: '', value: '' });
  const container = document.getElementById(`prices-${idx}`);
  const pi = currentServices[idx].prices.length - 1;
  container.insertAdjacentHTML('beforeend', buildPriceRow(idx, pi, { label: '', value: '' }));
}

function deletePrice(idx, pi) {
  currentServices[idx].prices.splice(pi, 1);
  // Перебудувати тільки prices контейнер
  const container = document.getElementById(`prices-${idx}`);
  container.innerHTML = currentServices[idx].prices
    .map((p, i) => buildPriceRow(idx, i, p)).join('');
}

function updatePrice(idx, pi, field, val) {
  currentServices[idx].prices[pi][field] = val;
}

// ── SAVE ──────────────────────────────────────────────────────
function saveAll() {
  localStorage.setItem('dim_keratin_services', JSON.stringify(currentServices));
  showToast('✓ Збережено!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Ініціалізація
if (sessionStorage.getItem('admin_auth') === '1') loadServices();
</script>
</body>
</html>
